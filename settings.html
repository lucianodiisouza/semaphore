<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Semaphore Settings</title>
    <link rel="stylesheet" href="/src/settings.css" />
  </head>
  <body>
    <div class="settings-page">
      <form id="settings-form">
        <h1 id="settings-title">Settings</h1>

        <section class="section">
          <label>
            <span id="label-theme">Theme</span>
            <select id="theme-select">
              <option value="classic">Classic</option>
              <option value="minimal">Minimal</option>
              <option value="neon">Neon</option>
            </select>
          </label>
          <label>
            <span id="label-language">Language</span>
            <select id="locale-select">
              <option value="en">English</option>
              <option value="pt-BR">Português</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input type="checkbox" id="stealth-checkbox" />
            <span id="label-stealth">Stealth mode (hide from screen share)</span>
          </label>
          <p id="stealth-note" class="note"></p>
        </section>

        <section class="section" id="sounds-section">
          <h2 id="label-sounds">Notification sounds</h2>
          <label class="checkbox-row">
            <input type="checkbox" id="sounds-enabled-checkbox" />
            <span id="label-sounds-enabled">Play a sound when the light changes</span>
          </label>
          <p id="sounds-note" class="note"></p>

          <div class="sound-row" data-stage="green">
            <span class="sound-label" id="label-sound-green">Green (ready)</span>
            <div class="sound-controls">
              <select class="sound-preset-select" id="sound-green-preset">
                <option value="soft-chime">Soft chime</option>
                <option value="double-ping">Double ping</option>
                <option value="alert">Alert</option>
                <option value="chime">Chime</option>
                <option value="bell">Bell</option>
                <option value="ping">Ping</option>
                <option value="pop">Pop</option>
                <option value="custom">Custom file…</option>
              </select>
              <button type="button" class="sound-browse-btn" id="sound-green-browse" hidden>Browse…</button>
              <button type="button" class="sound-preview-btn" id="sound-green-preview">Preview</button>
            </div>
            <span class="sound-custom-hint note" id="sound-green-hint" hidden></span>
          </div>

          <div class="sound-row" data-stage="yellow">
            <span class="sound-label" id="label-sound-yellow">Yellow (thinking)</span>
            <div class="sound-controls">
              <select class="sound-preset-select" id="sound-yellow-preset">
                <option value="soft-chime">Soft chime</option>
                <option value="double-ping">Double ping</option>
                <option value="alert">Alert</option>
                <option value="chime">Chime</option>
                <option value="bell">Bell</option>
                <option value="ping">Ping</option>
                <option value="pop">Pop</option>
                <option value="custom">Custom file…</option>
              </select>
              <button type="button" class="sound-browse-btn" id="sound-yellow-browse" hidden>Browse…</button>
              <button type="button" class="sound-preview-btn" id="sound-yellow-preview">Preview</button>
            </div>
            <span class="sound-custom-hint note" id="sound-yellow-hint" hidden></span>
          </div>

          <div class="sound-row" data-stage="red">
            <span class="sound-label" id="label-sound-red">Red (writing)</span>
            <div class="sound-controls">
              <select class="sound-preset-select" id="sound-red-preset">
                <option value="soft-chime">Soft chime</option>
                <option value="double-ping">Double ping</option>
                <option value="alert">Alert</option>
                <option value="chime">Chime</option>
                <option value="bell">Bell</option>
                <option value="ping">Ping</option>
                <option value="pop">Pop</option>
                <option value="custom">Custom file…</option>
              </select>
              <button type="button" class="sound-browse-btn" id="sound-red-browse" hidden>Browse…</button>
              <button type="button" class="sound-preview-btn" id="sound-red-preview">Preview</button>
            </div>
            <span class="sound-custom-hint note" id="sound-red-hint" hidden></span>
          </div>
        </section>

        <section class="section">
          <h2 id="label-connect">Connect tools</h2>
          <div class="tool-buttons">
            <button type="button" id="connect-cursor">Cursor</button>
            <button type="button" id="connect-claude">Claude Code</button>
            <button type="button" id="connect-codex">Codex</button>
            <button type="button" id="connect-gemini">Gemini CLI</button>
            <button type="button" id="connect-copilot">Copilot CLI</button>
            <button type="button" id="connect-all">All</button>
          </div>
        </section>

        <section class="section about">
          <h2 id="about-title">About</h2>
          <p id="about-description"></p>
          <ul id="about-lights" class="about-list"></ul>
          <h3 id="about-controls-title"></h3>
          <ul id="about-controls" class="about-list"></ul>
          <h3 id="about-tray-title"></h3>
          <ul id="about-tray" class="about-list"></ul>
        </section>

        <div class="actions">
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit" id="btn-save">Save</button>
        </div>
      </form>
    </div>
    <script type="module" src="/src/settings.ts"></script>
  </body>
</html>
