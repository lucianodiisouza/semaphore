name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: npm ci
      - run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: semaphore-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/macos/**/*.dmg
            target/${{ matrix.target }}/release/bundle/msi/*.msi
            target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/semctl
            target/${{ matrix.target }}/release/semctl.exe
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f | while read -r file; do
            base=$(basename "$file")
            case "$base" in
              semctl|semctl.exe) ;;
              *.dmg|*.msi|*.deb|*.AppImage|*-setup.exe) ;;
              *) continue ;;
            esac
            case "$file" in
              *aarch64-apple-darwin*) suffix="-macos-arm64" ;;
              *x86_64-apple-darwin*) suffix="-macos-x64" ;;
              *x86_64-unknown-linux-gnu*) suffix="-linux-x64" ;;
              *x86_64-pc-windows-msvc*) suffix="-windows-x64" ;;
              *) suffix="" ;;
            esac
            if [[ "$base" == *.* ]]; then
              ext="${base##*.}"
              stem="${base%.*}"
              dest="${stem}${suffix}.${ext}"
            else
              dest="${base}${suffix}"
            fi
            cp "$file" "release-assets/$dest"
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
